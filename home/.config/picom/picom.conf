backend = "glx";
vsync = true;
detect-client-opacity = true;
use-damage = true;
# Permite desligar o compositor automaticamente
unredir-if-possible = true;

# Garante que jogos não sejam compostos
unredir-if-possible-exclude = [
  "class_g = 'Sober'"
];

# Sombras
shadow = true;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.5;

# Fading
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

# Opacidade
inactive-opacity = 0.9;
active-opacity = 1.0;
frame-opacity = 0.9;

# Blur
blur-method = "dual_kawase";
blur-strength = 1;  
blur-background = true;
blur-background-frame = true;

# Regras de opacidade
rules = (
  { match = "class_g = 'st'"; opacity = 0.80; },
);

# ANIMAÇÕES
animations = (
  # ABRIR
  {
    triggers = ["open"];
    scale-x = {
      curve = "cubic-bezier(0.68, -0.55, 0.265, 1.55)";
      duration = 0.5;
      start = 0.0;
      end = 1.0;
    };
    scale-y = "scale-x";
    # Offset para compensar e fazer parecer que cresce do centro
    offset-x = {
      curve = "cubic-bezier(0.68, -0.55, 0.265, 1.55)";
      duration = 0.5;
      start = "window-width / 2";  # metade da largura
      end = 0;
    };
    offset-y = {
      curve = "cubic-bezier(0.68, -0.55, 0.265, 1.55)";
      duration = 0.5;
      start = "window-height / 2";  # metade da altura
      end = 0;
    };
    opacity = {
      curve = "cubic-bezier(0.25, 0.46, 0.45, 0.94)";
      duration = 0.4;
      start = 0;
      end = 1;
    };
  },
  
  # FECHAR
  {
    triggers = ["close"];
    scale-x = {
      curve = "cubic-bezier(0.6, 0, 0.8, 0.2)";
      duration = 0.3;
      start = 1.0;
      end = 0.0;
    };
    scale-y = "scale-x";
    # Offset para fechar em direção ao centro
    offset-x = {
      curve = "cubic-bezier(0.6, 0, 0.8, 0.2)";
      duration = 0.3;
      start = 0;
      end = "window-width / 2";
    };
    offset-y = {
      curve = "cubic-bezier(0.6, 0, 0.8, 0.2)";
      duration = 0.3;
      start = 0;
      end = "window-height / 2";
    };
    opacity = {
      curve = "cubic-bezier(0.25, 0.46, 0.45, 0.94)";
      duration = 0.3;
      start = 1;
      end = 0;
    };
  },
  
  # MINIMIZAR
  {
    triggers = ["hide"];
    offset-y = {
      curve = "cubic-bezier(0.25, 0.46, 0.45, 0.94)";
      duration = 0.25;
      start = 0;
      end = "window-height + 50";
    };
    opacity = {
      duration = 0.2;
      start = 1;
      end = 0;
    };
  },
  
  # RESTAURAR
  {
    triggers = ["show"];
    offset-y = {
      curve = "cubic-bezier(0.25, 0.46, 0.45, 0.94)";
      duration = 0.25;
      start = "window-height + 50";
      end = 0;
    };
    opacity = {
      duration = 0.2;
      start = 0;
      end = 1;
    };
  },
  
  # GEOMETRY
  {
    triggers = ["geometry"];
    preset = "geometry-change";
    duration = 0.25;
  }
);
