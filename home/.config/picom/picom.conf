#################################
#   Configuração Picom          #
#   Otimizada para PC Fraco     #
#   Com Animações (v12+)        #
#################################

backend = "glx";
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = true;
vsync = true;

animations = true;
animation-stiffness = 300.0;
animation-dampening = 25.0;
animation-clamping = true;
animation-mass = 1.0;

animation-for-open-window = "zoom";
animation-for-unmap-window = "zoom";
animation-for-transient-window = "slide-down";
animation-for-focus-window = "cubic";
animation-for-minimize-window = "slide-up";

fading = true;
fade-in-step = 0.015;
fade-out-step = 0.015;
fade-delta = 5;

shadow = true;

inactive-opacity = 0.85;
frame-opacity = 1.0;
inactive-opacity-override = false;
active-opacity = 1.0;

blur-background = true;
blur-method = "kernel";
blur-strength = 2;

corner-radius = 4;

focus-exclude = [ "class_g = 'dwm'" ];

wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 0.85; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 0.9; }
  dropdown_menu = { opacity = 0.9; }
};

mark-wmwin-focused = true;
mark-ovlp-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
log-level = "warn";
